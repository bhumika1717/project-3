<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spice Route Restaurant - Digital Menu</title>
   <style>/* Type selector for body */
body {
    font-family: Georgia, serif;
    font-size: 16px;
    margin: 0;
    padding: 0;
}

/* Header styling */
header {
    background-color: #8B4513;
    color: #FFFFFF;
    padding: 20px;
    text-align: center;
}

header h1 {
    margin: 0;
    font-size: 36px;
}

/* Main content */
main {
    padding: 20px;
}

/* Table styling */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

/* Caption styling */
caption {
    font-size: 24px;
    padding: 15px;
    font-weight: bold;
    color: #8B4513;
}

/* Header row styling */
th {
    background-color: #D2691E;
    color: #FFFFFF;
    padding: 12px;
    text-align: left;
    font-weight: bold;
    border: 1px solid #8B4513;
}

/* Data cells styling */
td {
    padding: 12px;
    border: 1px solid #ddd;
}

/* Alternate row colors for better readability */
tr:nth-child(odd) {
    background-color: #f9f9f9;
}

tr:nth-child(even) {
    background-color: #ffffff;
}
</style>
</head>
<body>
    <header>
        <h1>Spice Route Restaurant</h1>
    </header>

    <main>
        <table>
            <caption>Our Delicious Menu</caption>
            <tr>
                <th>Dish</th>
                <th>Category</th>
                <th>Price</th>
            </tr>
            <tr>
                <td>Chole Bhatoore</td>
                <td>Main Course</td>
                <td>Rs.150</td>
            </tr>
            <tr>
                <td>Paneer Tikka</td>
                <td>Appetizer</td>
                <td>Rs. 100</td>
            </tr>
            <tr>
                <td>Biryani</td>
                <td>Main Course</td>
                <td>Rs. 80</td>
            </tr>
            <tr>
                <td>Mango Lassi</td>
                <td>Beverage</td>
                <td>Rs. 70</td>
            </tr>
        </table>
    </main>
</body>
</html>
